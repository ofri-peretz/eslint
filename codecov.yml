# Codecov Configuration for ofri-peretz/eslint monorepo
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 0
  round: down
  range: '70...100'
  status:
    project:
      default:
        target: 100%
    patch:
      default:
        target: 100%

# ═══════════════════════════════════════════════════════════════════════════════
# FLAGS — per-plugin uploads (used for badge URLs)
# Badge URL: https://codecov.io/gh/ofri-peretz/eslint/graph/badge.svg?flag=<name>
# carryforward: true — if a plugin isn't in the current run, use last known value
# ═══════════════════════════════════════════════════════════════════════════════
flags:
  eslint-devkit:
    paths: [packages/eslint-devkit/]
    carryforward: true
  eslint-plugin-browser-security:
    paths: [packages/eslint-plugin-browser-security/]
    carryforward: true
  eslint-plugin-conventions:
    paths: [packages/eslint-plugin-conventions/]
    carryforward: true
  eslint-plugin-express-security:
    paths: [packages/eslint-plugin-express-security/]
    carryforward: true
  eslint-plugin-import-next:
    paths: [packages/eslint-plugin-import-next/]
    carryforward: true
  eslint-plugin-jwt:
    paths: [packages/eslint-plugin-jwt/]
    carryforward: true
  eslint-plugin-lambda-security:
    paths: [packages/eslint-plugin-lambda-security/]
    carryforward: true
  eslint-plugin-maintainability:
    paths: [packages/eslint-plugin-maintainability/]
    carryforward: true
  eslint-plugin-modernization:
    paths: [packages/eslint-plugin-modernization/]
    carryforward: true
  eslint-plugin-modularity:
    paths: [packages/eslint-plugin-modularity/]
    carryforward: true
  eslint-plugin-mongodb-security:
    paths: [packages/eslint-plugin-mongodb-security/]
    carryforward: true
  eslint-plugin-nestjs-security:
    paths: [packages/eslint-plugin-nestjs-security/]
    carryforward: true
  eslint-plugin-node-security:
    paths: [packages/eslint-plugin-node-security/]
    carryforward: true
  eslint-plugin-operability:
    paths: [packages/eslint-plugin-operability/]
    carryforward: true
  eslint-plugin-pg:
    paths: [packages/eslint-plugin-pg/]
    carryforward: true
  eslint-plugin-react-a11y:
    paths: [packages/eslint-plugin-react-a11y/]
    carryforward: true
  eslint-plugin-react-features:
    paths: [packages/eslint-plugin-react-features/]
    carryforward: true
  eslint-plugin-reliability:
    paths: [packages/eslint-plugin-reliability/]
    carryforward: true
  eslint-plugin-secure-coding:
    paths: [packages/eslint-plugin-secure-coding/]
    carryforward: true
  eslint-plugin-vercel-ai-security:
    paths: [packages/eslint-plugin-vercel-ai-security/]
    carryforward: true

comment:
  layout: 'header, diff, flags, components'
  behavior: default
  require_changes: false

# ═══════════════════════════════════════════════════════════════════════════════
# TEST ANALYTICS (https://docs.codecov.com/docs/test-analytics)
# ═══════════════════════════════════════════════════════════════════════════════
# Tracks test run times, failure rates, and flaky tests
# JUnit XML reports are uploaded via codecov/test-results-action in CI

# ═══════════════════════════════════════════════════════════════════════════════
# COMPONENT MANAGEMENT FOR MONOREPO
# ═══════════════════════════════════════════════════════════════════════════════
# Each package gets its own component for separate coverage tracking

component_management:
  default_rules:
    statuses:
      - type: project
        target: 100%
      - type: patch
        target: 100%
  individual_components:
    # ─────────────────────────────────────────────────────────────────────────
    # Security Plugins (Primary)
    # ─────────────────────────────────────────────────────────────────────────
    - component_id: eslint-plugin-secure-coding
      name: 'eslint-plugin-secure-coding'
      paths:
        - packages/eslint-plugin-secure-coding/**
      statuses:
        - type: project
          target: 100%
        - type: patch
          target: 100%

    - component_id: eslint-plugin-jwt
      name: 'eslint-plugin-jwt'
      paths:
        - packages/eslint-plugin-jwt/**
      statuses:
        - type: project
          target: 100%
        - type: patch
          target: 100%

    - component_id: eslint-plugin-pg
      name: 'eslint-plugin-pg'
      paths:
        - packages/eslint-plugin-pg/**
      statuses:
        - type: project
          target: 100%
        - type: patch
          target: 100%

    - component_id: eslint-plugin-mongodb-security
      name: 'eslint-plugin-mongodb-security'
      paths:
        - packages/eslint-plugin-mongodb-security/**
      statuses:
        - type: project
          target: 100%
        - type: patch
          target: 100%

    - component_id: eslint-plugin-node-security
      name: 'eslint-plugin-node-security'
      paths:
        - packages/eslint-plugin-node-security/**
      statuses:
