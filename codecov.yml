    # NOTE: cli is an infrastructure package without tests - excluded

# ═══════════════════════════════════════════════════════════════════════════════
# IGNORE PATHS
# ═══════════════════════════════════════════════════════════════════════════════
# Files that don't contain runtime logic or lack tests

ignore:
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/.nx/**'
  - '**/types/**'
  - '**/types/index.ts'
  - '**/coverage/**'
  - '**/test-results/**'
  - '**/*.config.ts'
  - '**/*.config.mts'
  - '**/vitest.global-setup.ts'
