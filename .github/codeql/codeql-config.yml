name: "CodeQL Config — eslint-plugin monorepo"

# CodeQL scans application code only — the security-rule corpora and AI-
# generated samples live under benchmarks/ and are INTENTIONALLY vulnerable.
# They are the input fixtures for our ESLint security plugins (we ship rules
# that detect exactly these patterns), so flagging them here would be both
# expected and unactionable. Scoping the scan to first-party app code is the
# standard CodeQL configuration for repositories that maintain their own
# vulnerable-by-design test corpus.

paths:
  - apps
  - packages
  - scripts
  - tools

paths-ignore:
  # Vulnerable-by-design CWE corpus consumed by our security plugins' tests.
  - benchmarks/corpus/**
  # AI-generated micro-samples consumed by ILB-AI benchmarks. Many are
  # auth/crypto anti-patterns by construction; CodeQL findings here are
  # the EXPECTED output, not regressions.
  - benchmarks/suites/ilb-ai/generated-haiku/**
  - benchmarks/suites/ilb-ai/generated/**
  # Benchmark suite fixtures (committed inputs to bench runners, not
  # shipped code).
  - benchmarks/suites/*/fixtures/**
  # Tool & benchmark output directories that may contain user-supplied
  # snippets via workflow_dispatch.
  - benchmarks/results/**
  - benchmarks/.bench-repos/**
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/.next/**"
  - "**/.turbo/**"
  # Storybook static build output — generated, minified third-party bundles
  # (sb-manager/globals-runtime.js, etc.). Already in .gitignore; this is the
  # belt-and-braces guard for CodeQL even if a build artifact ends up checked
  # out (e.g. local accidental commit, future workflow that builds-then-scans).
  - "**/storybook-static/**"
  # Generated Playwright HTML report — apps/docs/playwright-report/index.html is
  # a bundled+minified single-page app, not first-party source. Already in
  # .gitignore (and untracked from git); same belt-and-braces rationale as
  # storybook-static so an accidentally-checked-out report is never scanned.
  - "**/playwright-report/**"
  # Per-plugin vulnerable-by-design fixtures: the secure-coding benchmark inputs
  # (safe-patterns.js / vulnerable.ts) and the artifact-smoke ReDoS fixture are
  # the EXPECTED input to our own security rules — same rationale as
  # benchmarks/corpus above, just colocated under packages/.
  - "packages/*/benchmark/test-files/**"
  - "packages/*/test/artifact-smoke/**"

queries:
  - uses: security-extended
  - uses: security-and-quality

# ─────────────────────────────────────────────────────────────────────────────
# Query exclusions — explicit "won't fix" with rationale per query.
#
# These are NOT blanket suppressions. Each entry below documents a CodeQL
# query whose default threat model does not apply to our context. We disable
# them by `id` so they stop generating noise across the repo while leaving
# the rest of `security-extended` + `security-and-quality` fully active.
# ─────────────────────────────────────────────────────────────────────────────
query-filters:
  # `js/file-from-untrusted-data` ("Network data written to file") fires on
  # the entire purpose of three scripts:
  #   - scripts/ilb-cve-synthesize.ts: caches NVD CVE responses + writes
  #     auto-drafted rule skeletons. Persisting that data is the script.
  #   - scripts/ilb-fuzz.ts: writes LLM-fuzzed candidate fixtures by design.
  #     The Claude API response IS the desired output.
  #   - scripts/fetch-eslint-version-stats.ts: writes the npm registry
  #     download-counts snapshot we explicitly fetched and aggregated.
  # All three already validate response shape before persisting (CVE_ID_RE,
  # SEMVER_RE, normalizeFuzzReply). The "untrusted data → file" pattern is
  # the script's intent, not a vulnerability.
  - exclude:
      id: js/file-from-untrusted-data
  # `js/http-to-file-access` is the same network→file pattern under a different
  # query id; it fires on the identical three scripts above (ilb-cve-synthesize,
  # ilb-fuzz, fetch-eslint-version-stats). Same rationale: the validated
  # response IS the intended on-disk artifact, not a tainted-data leak.
  - exclude:
      id: js/http-to-file-access
