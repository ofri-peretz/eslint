name: 'Interlace Audit'
description: 'Run the Interlace ESLint security suite on a codebase, emit SARIF, and (optionally) upload to GitHub Code Scanning Alerts. Roadmap item 6.1.'
author: 'Interlace'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  path:
    description: 'Path to lint (default: repository root).'
    required: false
    default: '.'
  plugins:
    description: 'Comma-separated list of plugins to enable (default: secure-coding,node-security,browser-security). Use "all" to enable the full security fleet.'
    required: false
    default: 'secure-coding,node-security,browser-security'
  format:
    description: 'Output format: sarif | json | stylish.'
    required: false
    default: 'sarif'
  output-file:
    description: 'Where to write the lint output (defaults to interlace-audit.sarif when format=sarif).'
    required: false
    default: ''
  upload-sarif:
    description: 'Upload the SARIF file to GitHub Code Scanning Alerts (requires permissions: security-events: write). Only effective when format=sarif.'
    required: false
    default: 'true'
  fail-on:
    description: 'Severity at or above which the action fails the job: error | warning | none.'
    required: false
    default: 'error'
  interlace-version:
    description: 'Version range for @interlace/cli to install. Default: latest.'
    required: false
    default: 'latest'

outputs:
  sarif-path:
    description: 'Path to the SARIF file emitted (when format=sarif).'
    value: ${{ steps.lint.outputs.sarif-path }}
  finding-count:
    description: 'Total number of findings emitted across all plugins.'
    value: ${{ steps.lint.outputs.finding-count }}

runs:
  using: 'composite'
  steps:
    - name: Resolve output path
      id: paths
      shell: bash
      run: |
        OUT="${{ inputs.output-file }}"
        if [ -z "$OUT" ]; then
          case "${{ inputs.format }}" in
            sarif) OUT="interlace-audit.sarif" ;;
            json)  OUT="interlace-audit.json"  ;;
            *)     OUT="interlace-audit.txt"   ;;
          esac
        fi
        echo "out=$OUT" >> "$GITHUB_OUTPUT"

    - name: Install Interlace CLI + plugins
      shell: bash
      run: |
        echo "::group::Installing @interlace/cli@${{ inputs.interlace-version }}"
        # Install CLI globally so `interlace` is on PATH
        npm install -g "@interlace/cli@${{ inputs.interlace-version }}"
        # Install the plugins the user asked for (or the full security fleet)
        if [ "${{ inputs.plugins }}" = "all" ]; then
          PLUGINS="secure-coding browser-security node-security crypto jwt express-security lambda-security mongodb-security nestjs-security vercel-ai-security pg"
        else
          PLUGINS="$(echo '${{ inputs.plugins }}' | tr ',' ' ')"
        fi
        for p in $PLUGINS; do
          npm install -g "@interlace/eslint-plugin-$p@latest"
        done
        # SARIF formatter, if needed
        if [ "${{ inputs.format }}" = "sarif" ]; then
          npm install -g "@interlace/eslint-formatter-sarif@latest"
        fi
        echo "::endgroup::"

    - name: Generate eslint.config.mjs (if missing)
      shell: bash
      run: |
        if [ ! -f eslint.config.mjs ] && [ ! -f eslint.config.js ] && [ ! -f .eslintrc.json ]; then
          echo "::group::No ESLint config found — generating starter via 'interlace init'"
          interlace init
          echo "::endgroup::"
        else
          echo "ESLint config already present; using it as-is."
        fi

    - name: Run interlace audit
      id: lint
      shell: bash
      run: |
        echo "::group::interlace audit ${{ inputs.path }} --format=${{ inputs.format }}"
        OUT="${{ steps.paths.outputs.out }}"
        # Capture exit so we can decide based on fail-on
        set +e
        if [ "${{ inputs.format }}" = "sarif" ]; then
          interlace audit --sarif "${{ inputs.path }}" > "$OUT"
        elif [ "${{ inputs.format }}" = "json" ]; then
          interlace audit --json  "${{ inputs.path }}" > "$OUT"
        else
          interlace audit         "${{ inputs.path }}" | tee "$OUT"
        fi
        EX=$?
        set -e

        # Count findings (best-effort, format-aware)
        COUNT=0
        if [ "${{ inputs.format }}" = "sarif" ]; then
          COUNT=$(jq '.runs[0].results | length' "$OUT" 2>/dev/null || echo 0)
        elif [ "${{ inputs.format }}" = "json" ]; then
          COUNT=$(jq '[.[].messages[]] | length' "$OUT" 2>/dev/null || echo 0)
        fi

        echo "sarif-path=$OUT" >> "$GITHUB_OUTPUT"
        echo "finding-count=$COUNT" >> "$GITHUB_OUTPUT"
        echo "Total findings: $COUNT"

        # Decide pass/fail per fail-on input
        case "${{ inputs.fail-on }}" in
          error)
            # ESLint exits 1 when there's an error-severity finding
            if [ "$EX" -gt 1 ]; then
              echo "::error::ESLint crashed (exit $EX)"
              exit "$EX"
            fi
            exit "$EX"
            ;;
          warning)
            if [ "$COUNT" -gt 0 ]; then
              echo "::error::Found $COUNT lint findings (fail-on=warning)"
              exit 1
            fi
            ;;
          none)
            ;;
          *)
            echo "::warning::Unknown fail-on value '${{ inputs.fail-on }}' — treating as 'error'"
            exit "$EX"
            ;;
        esac
        echo "::endgroup::"

    - name: Upload SARIF to Code Scanning Alerts
      if: ${{ inputs.format == 'sarif' && inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.lint.outputs.sarif-path }}
        category: 'interlace'
