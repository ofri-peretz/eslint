# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Affected Packages

# ═══════════════════════════════════════════════════════════════════════════════
# TURBO-BASED RELEASE WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════════
#
# Releases only packages whose version (in package.json) is ahead of npm's
# latest published version. Affected detection comes from Turbo's `--affected`
# flag (diff against `--filter=...[origin/main]` for PRs, or last release tag
# for main pushes).
#
# Versioning model: package.json `version` is the source of truth. Bump it in
# a PR, merge to main, then trigger this workflow (or set `auto-on-push: true`
# below to auto-release on every push to main).
#
# Authentication:
#   - Trusted Publishers (OIDC) for existing packages — no token needed
#   - NPM_TOKEN fallback for first-release packages
#
# Dependency order: `@interlace/eslint-devkit` always publishes first when
# affected, since other packages depend on it. Turbo's task graph determines
# this automatically via `^build`.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run: build + show what would publish, but don't publish"
        required: false
        type: boolean
        default: false
      dist-tag:
        description: "NPM distribution tag"
        required: false
        type: choice
        options: [latest, next, beta, rc, alpha]
        default: latest

concurrency:
  group: release-workflow
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_CONCURRENCY: "4"

jobs:
  build-and-detect:
    name: 🏗️ Build affected + detect publishable
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      package-count: ${{ steps.detect.outputs.package-count }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🏗️ Build affected packages
        run: npx turbo run build --affected

      - name: 🔍 Detect packages with version ahead of npm
        id: detect
        run: |
          # Iterate every package under packages/, compare local version to
          # npm-published version. If local > npm (or 404 == first-release),
          # add to publish list.
          set -e
          PUBLISH_LIST=""
          for pkg_dir in packages/*/; do
            pkg_name=$(basename "$pkg_dir")
            pkg_json="$pkg_dir/package.json"
            [ -f "$pkg_json" ] || continue

            # Skip private packages
            is_private=$(node -p "require('./$pkg_json').private === true" 2>/dev/null || echo "false")
            [ "$is_private" = "true" ] && continue

            # Skip packages without a build output (means turbo --affected didn't include them)
            [ -d "$pkg_dir/dist" ] || continue

            npm_name=$(node -p "require('./$pkg_json').name")
            local_ver=$(node -p "require('./$pkg_json').version")

            # Query npm for latest published version
            npm_ver=$(npm view "$npm_name" version 2>/dev/null || echo "")

            if [ -z "$npm_ver" ]; then
              echo "🆕 $npm_name: first release ($local_ver)"
              PUBLISH_LIST="${PUBLISH_LIST}${pkg_name},"
              continue
            fi

            # Use semver to compare; fail-soft if comparison errors
            cmp=$(node -e "
              const semver = require('semver');
              const local = '$local_ver';
              const remote = '$npm_ver';
              if (semver.gt(local, remote)) console.log('ahead');
              else if (semver.eq(local, remote)) console.log('same');
              else console.log('behind');
            " 2>/dev/null || echo "error")

            case "$cmp" in
              ahead)
                echo "📦 $npm_name: $npm_ver -> $local_ver (publishing)"
                PUBLISH_LIST="${PUBLISH_LIST}${pkg_name},"
                ;;
              same)
                echo "✅ $npm_name: $local_ver (already published)"
                ;;
              behind)
                echo "⚠️ $npm_name: local $local_ver < npm $npm_ver (skip)"
                ;;
              *)
                echo "❌ $npm_name: comparison error (skip)"
                ;;
            esac
          done

          PUBLISH_LIST="${PUBLISH_LIST%,}"
          if [ -z "$PUBLISH_LIST" ]; then
            echo "ℹ️ No packages to publish"
            echo "packages=" >> $GITHUB_OUTPUT
            echo "package-count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$PUBLISH_LIST" | tr ',' '\n' | wc -l | tr -d ' ')
            echo "🎯 Publishing $COUNT package(s): $PUBLISH_LIST"
            echo "packages=$PUBLISH_LIST" >> $GITHUB_OUTPUT
            echo "package-count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Upload dist artifacts for publish job
        if: steps.detect.outputs.package-count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: 🚀 Publish to npm
    needs: build-and-detect
    if: needs.build-and-detect.outputs.package-count != '0'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write # for git tag push
      id-token: write # for npm Trusted Publishers (OIDC)
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: ⬆️ Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: 📥 Restore dist artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/

      - name: 🔧 Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🚀 Publish each affected package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          PACKAGES: ${{ needs.build-and-detect.outputs.packages }}
          DRY_RUN: ${{ inputs.dry-run }}
          DIST_TAG: ${{ inputs.dist-tag }}
        run: |
          set -e
          IFS=',' read -ra PKG_ARRAY <<< "$PACKAGES"
          PUBLISHED=""

          for pkg in "${PKG_ARRAY[@]}"; do
            dist_dir="packages/$pkg/dist"
            [ -d "$dist_dir" ] || { echo "⚠️ $pkg: no dist/, skipping"; continue; }

            ver=$(node -p "require('./$dist_dir/package.json').version")
            name=$(node -p "require('./$dist_dir/package.json').name")
            tag_name="${pkg}@${ver}"

            echo ""
            echo "═════════════════════════════════════════════════════════"
            echo "📦 $name@$ver"
            echo "═════════════════════════════════════════════════════════"

            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍 [dry-run] would publish $name@$ver with tag '$DIST_TAG'"
              (cd "$dist_dir" && npm publish --dry-run --tag "$DIST_TAG" --access public)
              continue
            fi

            (cd "$dist_dir" && npm publish --tag "$DIST_TAG" --access public --provenance)

            # Tag the release in git
            git tag -a "$tag_name" -m "Release $tag_name" || echo "(tag exists)"
            git push origin "$tag_name" || echo "(push failed; tag may exist remotely)"

            PUBLISHED="${PUBLISHED}${name}@${ver} "
          done

          echo ""
          echo "═════════════════════════════════════════════════════════"
          echo "✅ DONE. Published: ${PUBLISHED:-(none)}"
          echo "═════════════════════════════════════════════════════════"
