# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Affected Packages

# Dynamic title shown in the Actions list — distinguishes auto-fired pushes
# from manual dry-runs at a glance, and surfaces the dist-tag for non-latest
# releases.
run-name: >-
  Release${{ inputs.dry-run && ' (dry-run)' || '' }} · ${{ inputs.dist-tag || 'latest' }} · ${{ github.event_name == 'push' && github.event.head_commit.message || github.actor }}

# ═══════════════════════════════════════════════════════════════════════════════
# TURBO + MATRIX-PARALLEL RELEASE WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════════
#
# Triggers automatically on every push to main (typically the merge of a
# changesets-managed "Version Packages" PR). The detect stage compares each
# package's local `version` field against npm's published version and only
# fans out for packages that actually changed — so non-release pushes are a
# fast no-op.
#
# Four-stage pipeline:
#
#   1. detect       — diff package.json versions vs npm; emit JSON matrix of
#                     publishable packages.
#   2. build        — run `turbo run build --affected` once (Turbo dedupes
#                     across packages); upload `dist/` as a single artifact.
#   3. publish (×N) — matrix fan-out: ONE job per package, all in parallel.
#                     Each job downloads dist, npm-publishes its own package,
#                     and tags the release.
#   4. summarize    — single rollup job posting the result.
#
# Dependency order: `@interlace/eslint-devkit` is consumed by other packages,
# but at PUBLISH time we ship pre-built `dist/` artifacts — there is no
# build-time interaction between the publish jobs, so parallelism is safe.
# Turbo's `^build` already ensures consumers built against the new devkit
# before we got here.
#
# Authentication:
#   - Trusted Publishers (OIDC) for existing packages — no token needed.
#   - NPM_TOKEN fallback for first-release packages.
#
# Manual override: workflow_dispatch with dry-run=true lets you preview
# what would publish without actually shipping anything (useful for
# debugging the detect logic).
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run: build + show what would publish, but don't publish."
        required: false
        type: boolean
        default: false
      dist-tag:
        description: "NPM distribution tag."
        required: false
        type: choice
        options: [latest, next, beta, rc, alpha]
        default: latest

concurrency:
  group: release-workflow
  cancel-in-progress: false

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_CONCURRENCY: "4"
  # Turbo Remote Cache — see quality.yml for setup notes. Pulls build
  # artefacts the Quality Gate already produced for the same SHA, so the
  # release "build affected" stage usually returns instantly.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 1 — Detect publishable packages.
  # Fast path: doesn't require building. Just compares local versions to npm.
  # ─────────────────────────────────────────────────────────────────────────
  detect:
    name: Detect publishable packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: ./.github/actions/setup
        with:
          turbo-cache: "false"

      - name: Diff local versions vs npm
        id: detect
        run: |
          set -euo pipefail
          publish=()
          for pkg_json in packages/*/package.json; do
            dir=$(dirname "$pkg_json")
            pkg=$(basename "$dir")

            is_private=$(node -p "require('./$pkg_json').private === true" 2>/dev/null || echo false)
            [ "$is_private" = "true" ] && continue

            name=$(node -p "require('./$pkg_json').name")
            local_ver=$(node -p "require('./$pkg_json').version")
            npm_ver=$(npm view "$name" version 2>/dev/null || echo "")

            if [ -z "$npm_ver" ]; then
              echo "🆕 $name: first release ($local_ver)"
              publish+=("{\"dir\":\"$pkg\",\"name\":\"$name\",\"version\":\"$local_ver\"}")
              continue
            fi

            cmp=$(node -e "
              const semver = require('semver');
              if (semver.gt('$local_ver', '$npm_ver')) console.log('ahead');
              else if (semver.eq('$local_ver', '$npm_ver')) console.log('same');
              else console.log('behind');
            " 2>/dev/null || echo error)

            case "$cmp" in
              ahead)
                echo "📦 $name: $npm_ver → $local_ver"
                publish+=("{\"dir\":\"$pkg\",\"name\":\"$name\",\"version\":\"$local_ver\"}")
                ;;
              same)    echo "✅ $name: $local_ver (already published)" ;;
              behind)  echo "⚠️  $name: local $local_ver < npm $npm_ver (skip)" ;;
              *)       echo "❌ $name: comparison error (skip)" ;;
            esac
          done

          count=${#publish[@]}
          if [ "$count" -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            json=$(IFS=,; echo "[${publish[*]}]")
            echo "matrix={\"include\":$json}" >> "$GITHUB_OUTPUT"
            echo "count=$count" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Build affected packages once and upload dist/ artifact.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build affected
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: ./.github/actions/setup

      - name: Build affected packages
        run: npx turbo run build --affected

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 3 — Publish each package in parallel (matrix fan-out).
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish ${{ matrix.name }}@${{ matrix.version }}
    needs: [detect, build]
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: write   # for git tag push
      id-token: write   # for npm Trusted Publishers (OIDC)
    strategy:
      # Don't cancel siblings on a single publish failure — partial releases
      # are recoverable, but losing successful publishes to a sibling's failure
      # is not.
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
          cache: npm

      # OIDC-capable npm CLI ships in npm@>=11.5; runner ships an older one.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Restore dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish ${{ matrix.name }}@${{ matrix.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          # On workflow_dispatch, inputs.* carry user-supplied values.
          # On push, they default to false / "latest" (real release).
          DRY_RUN: ${{ inputs.dry-run || false }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}
          PKG_DIR: packages/${{ matrix.dir }}/dist
          PKG_NAME: ${{ matrix.name }}
          PKG_VER: ${{ matrix.version }}
        run: |
          set -euo pipefail
          if [ ! -d "$PKG_DIR" ]; then
            echo "::error::Missing $PKG_DIR — build artifact incomplete."
            exit 1
          fi
          # tag format: <unscoped-name>@<version>, e.g. "eslint-plugin-crypto@1.2.3"
          tag_name="${PKG_NAME##*/}@${PKG_VER}"

          echo "═════════════════════════════════════════════════════════"
          echo "📦 $PKG_NAME@$PKG_VER (dist-tag: $DIST_TAG)"
          echo "═════════════════════════════════════════════════════════"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 [dry-run] would publish $PKG_NAME@$PKG_VER"
            (cd "$PKG_DIR" && npm publish --dry-run --tag "$DIST_TAG" --access public)
            exit 0
          fi

          # Idempotency: if this exact version is already on npm, skip without
          # error. Keeps re-runs after partial failures safe.
          if npm view "$PKG_NAME@$PKG_VER" version >/dev/null 2>&1; then
            echo "✅ $PKG_NAME@$PKG_VER already on npm — skipping publish."
          else
            (cd "$PKG_DIR" && npm publish --tag "$DIST_TAG" --access public --provenance)
          fi

          # Tag in git (idempotent — fail-soft if tag already exists).
          if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null; then
            echo "(local tag $tag_name already exists)"
          else
            git tag -a "$tag_name" -m "Release $tag_name"
          fi
          git push origin "$tag_name" || echo "(tag push failed — likely already on remote)"

          # Stash the tag name + the per-version CHANGELOG slice for the
          # GitHub Release step that follows. We use --fallback so a missing
          # CHANGELOG section produces a generic stub rather than failing
          # the whole publish.
          mkdir -p .release-notes
          notes_file=".release-notes/${tag_name//\//_}.md"
          npx tsx scripts/extract-changelog.ts "packages/${{ matrix.dir }}" "$PKG_VER" --fallback > "$notes_file"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_ENV"
          echo "NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_NAME: ${{ matrix.name }}
          PKG_VER: ${{ matrix.version }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}
        run: |
          set -euo pipefail
          # Idempotent: if the release already exists for this tag, just
          # update its body (handy for re-runs after a flaky publish).
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "↻ Release $TAG_NAME exists — updating notes."
            gh release edit "$TAG_NAME" \
              --notes-file "$NOTES_FILE" \
              --title "$PKG_NAME@$PKG_VER"
          else
            echo "🆕 Creating release $TAG_NAME"
            # `--latest=false` avoids each per-package release stealing
            # the repo-wide "Latest" badge; the most-recent overall is
            # marked latest by GitHub automatically.
            #
            # `--prerelease` for non-`latest` dist-tags keeps these out of
            # the default release page view.
            extra_flags=()
            if [ "$DIST_TAG" != "latest" ]; then
              extra_flags+=(--prerelease)
            fi
            gh release create "$TAG_NAME" \
              --title "$PKG_NAME@$PKG_VER" \
              --notes-file "$NOTES_FILE" \
              --latest=false \
              "${extra_flags[@]}"
          fi

      - name: Job summary
        if: always()
        env:
          PKG_NAME: ${{ matrix.name }}
          PKG_VER: ${{ matrix.version }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}
          DRY_RUN: ${{ inputs.dry-run || false }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          status="✅ published"
          [ "$DRY_RUN" = "true" ] && status="🔍 dry-run"

          npm_url="https://www.npmjs.com/package/${PKG_NAME}/v/${PKG_VER}"
          tag_short="${PKG_NAME##*/}@${PKG_VER}"
          gh_url="https://github.com/${REPO}/releases/tag/${tag_short}"

          {
            echo "## $status — \`$PKG_NAME@$PKG_VER\`"
            echo ""
            echo "| | |"
            echo "|--|--|"
            echo "| **Dist-tag**     | \`$DIST_TAG\` |"
            echo "| **npm**          | [$PKG_NAME@$PKG_VER]($npm_url) |"
            echo "| **GitHub Release** | [$tag_short]($gh_url) |"
            echo "| **Provenance**   | [\`--provenance\` enabled](https://docs.npmjs.com/generating-provenance-statements) |"
            echo ""
            if [ -f "$NOTES_FILE" ]; then
              echo "<details><summary>Release notes</summary>"
              echo ""
              cat "$NOTES_FILE"
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 4 — Summary.
  # ─────────────────────────────────────────────────────────────────────────
  summarize:
    name: Release summary
    needs: [detect, build, publish]
    if: always() && needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Write rollup
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DRY_RUN: ${{ inputs.dry-run || false }}
          DIST_TAG: ${{ inputs.dist-tag || 'latest' }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Resolve overall status emoji.
          if [ "$DRY_RUN" = "true" ]; then
            status_label="🔍 Dry run"
          elif [ "$PUBLISH_RESULT" = "success" ]; then
            status_label="✅ Released"
          elif [ "$PUBLISH_RESULT" = "failure" ]; then
            status_label="❌ Failed"
          elif [ "$PUBLISH_RESULT" = "cancelled" ]; then
            status_label="⏹ Cancelled"
          else
            status_label="⚠️ $PUBLISH_RESULT"
          fi

          {
            echo "# $status_label · ${{ needs.detect.outputs.count }} package(s)"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Trigger | \`${{ github.event_name }}\` by @${ACTOR} |"
            echo "| Mode | ${DRY_RUN:+dry-run}${DRY_RUN:-publish} |"
            echo "| Dist-tag | \`$DIST_TAG\` |"
            echo "| Build | $BUILD_RESULT |"
            echo "| Publish (matrix) | $PUBLISH_RESULT |"
            echo ""
            echo "## Packages"
            echo ""
            echo "| Package | Version | npm | GH Release |"
            echo "|---|---|---|---|"
            # Iterate the matrix that detect emitted. jq tolerates the
            # empty-include case (count == 0 is excluded by the job's `if:`).
            echo "$MATRIX" | jq -r --arg repo "$REPO" '
              .include[]?
              | "| \(.name) | \(.version) | [npm](https://www.npmjs.com/package/\(.name)/v/\(.version)) | [\(.name | sub("^@[^/]+/"; ""))@\(.version)](https://github.com/\($repo)/releases/tag/\(.name | sub("^@[^/]+/"; ""))@\(.version)) |"
            '
            echo ""
            if [ "$PUBLISH_RESULT" != "success" ] && [ "$DRY_RUN" != "true" ]; then
              echo "## ⚠️ Recovery"
              echo ""
              echo "If a publish failed mid-flight, re-running this workflow is safe — every step is idempotent:"
              echo ""
              echo "\`\`\`bash"
              echo "npm run release           # re-run via workflow_dispatch"
              echo "npm run release:status    # see what's still pending"
              echo "\`\`\`"
              echo ""
              echo "If tags / npm / GH Releases drift, the weekly \`release-hygiene.yml\` workflow opens a tracking issue + can backfill."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
