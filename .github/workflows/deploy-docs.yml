# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Docs

# ─────────────────────────────────────────────────────────────────────────────
# Manual-only deploy of `apps/docs` (Next.js → Vercel).
#
# Why manual: vercel.json sets `git.deploymentEnabled: false` so Vercel does
# NOT auto-deploy on push. This workflow is the single, deliberate path to
# ship docs to production (or a preview URL).
#
# Required secrets (Settings → Secrets):
#   - VERCEL_TOKEN     personal access token from https://vercel.com/account/tokens
#                      (scope: full account or limited to this project)
# Optional (auto-detected from .vercel/project.json if present):
#   - VERCEL_ORG_ID    fallback if .vercel/project.json is .gitignored
#   - VERCEL_PROJECT_ID
# ─────────────────────────────────────────────────────────────────────────────

run-name: >-
  Deploy Docs · ${{ inputs.environment }} · ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment.'
        required: true
        type: choice
        options: [preview, production]
        default: preview
      ref:
        description: "Git ref to deploy (default: this workflow's checkout — typically main for production)."
        required: false
        default: ''

concurrency:
  # Don't overlap two prod deploys; preview deploys can coexist (one per ref).
  group: deploy-docs-${{ inputs.environment }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write # GitHub Deployments API → record the deploy URL

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      # Maps to GitHub Environments — gate on reviewers if you want a manual
      # approval step before production deploys (Settings → Environments → production).
      name: ${{ inputs.environment == 'production' && 'docs-production' || 'docs-preview' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          turbo-cache: 'false'

      - name: Pull Vercel environment metadata
        run: |
          set -euo pipefail
          npx vercel pull \
            --yes \
            --environment=${{ inputs.environment }} \
            --token="$VERCEL_TOKEN"

      # ─── Analytics regression lock (env) ───────────────────────────────
      # The docs site went dark in PostHog because NEXT_PUBLIC_POSTHOG_KEY
      # was stored as a *Sensitive* Vercel var: `vercel pull` returns an
      # EMPTY value for sensitive vars, so `vercel build` inlines an empty
      # key and `initPostHog()` silently no-ops (`if (!key) return`). Catch
      # that here — before we ship a build with dark analytics. A NEXT_PUBLIC_*
      # key is public by definition and MUST be non-sensitive so the build
      # can read it. See CLAUDE.md "Regressions are the issue. Lock
      # everything you fix." Scoped to production (the surface that must
      # report); preview deploys are not gated on analytics.
      - name: Verify PostHog key present in production env
        if: inputs.environment == 'production'
        run: |
          set -euo pipefail
          ENVFILE=".vercel/.env.production.local"
          [ -f "$ENVFILE" ] || ENVFILE="apps/docs/.vercel/.env.production.local"
          if [ ! -f "$ENVFILE" ]; then
            echo "::error::Expected $ENVFILE from 'vercel pull' but it is missing."
            exit 1
          fi
          KEY="$(grep -E '^NEXT_PUBLIC_POSTHOG_KEY=' "$ENVFILE" | head -1 | cut -d= -f2- | tr -d '"' || true)"
          if [ -z "$KEY" ]; then
            echo "::error::NEXT_PUBLIC_POSTHOG_KEY is empty in the production env — analytics would be dark."
            echo "::error::Fix: vercel env rm NEXT_PUBLIC_POSTHOG_KEY production && vercel env add NEXT_PUBLIC_POSTHOG_KEY production --no-sensitive (value = the PostHog project's phc_ api_token). Sensitive vars are unreadable by 'vercel build'."
            exit 1
          fi
          case "$KEY" in
            phc_*) echo "✅ NEXT_PUBLIC_POSTHOG_KEY present (${KEY:0:8}…)" ;;
            *) echo "::error::NEXT_PUBLIC_POSTHOG_KEY is set but does not look like a PostHog 'phc_' key." ; exit 1 ;;
          esac

      - name: Build (${{ inputs.environment }})
        run: |
          set -euo pipefail
          # Production gets `--prod`; preview omits it. Vercel CLI uses the
          # build settings from vercel.json (cd apps/docs && next build).
          if [ "${{ inputs.environment }}" = "production" ]; then
            npx vercel build --prod --token="$VERCEL_TOKEN"
          else
            npx vercel build --token="$VERCEL_TOKEN"
          fi

      # ─── Analytics regression lock (built bundle) ──────────────────────
      # Ultimate truth: the public phc_ key must actually be inlined into a
      # client-served JS chunk. If the env check above ever drifts (path
      # change, new var name), this catches dark analytics at the artifact
      # level. Greps the Build Output API static surface for a phc_ token.
      - name: Verify PostHog key inlined in built client bundle
        if: inputs.environment == 'production'
        run: |
          set -euo pipefail
          OUT=".vercel/output/static"
          [ -d "$OUT" ] || OUT="apps/docs/.vercel/output/static"
          [ -d "$OUT" ] || OUT=".vercel/output"
          if grep -rqlE 'phc_[A-Za-z0-9]{30,}' "$OUT" 2>/dev/null; then
            echo "✅ PostHog phc_ key inlined in the built client bundle ($OUT)."
          else
            echo "::error::No 'phc_' PostHog key found under $OUT — the production build has dark analytics. See the env step above."
            exit 1
          fi

      # ─── Pre-deploy smoke gate ─────────────────────────────────────────
      # `vercel build` already populated apps/docs/.next, so `next start`
      # serves the artifact we're about to ship. The smoke spec checks the
      # exact failure modes structural vitest locks miss: silently-empty
      # homepage sections, broken cached image URLs (tweets / dev.to /
      # CDN rotations), and mobile-only layout collapse at 390px.
      #
      # See: apps/docs/e2e/deploy-smoke.spec.ts + CLAUDE.md "Investigate
      # before claiming 'fixed'".
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: apps/docs

      - name: Pre-deploy smoke
        run: npm run test:smoke
        working-directory: apps/docs

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-smoke-${{ inputs.environment }}
          path: |
            apps/docs/test-results-smoke/
            apps/docs/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Deploy prebuilt artifact
        id: deploy
        # `--archive=tgz` packs the prebuilt artifact into a tarball before
        # upload. Required because the docs build emits >15k files (Vercel's
        # per-deploy file-count limit), driven by the rule-table page corpus.
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = "production" ]; then
            url=$(npx vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN")
          else
            url=$(npx vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Job summary
        if: always()
        env:
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          status="${{ job.status }}"
          icon="✅"
          [ "$status" = "failure" ] && icon="❌"
          [ "$status" = "cancelled" ] && icon="⏹"
          {
            echo "# $icon Deploy Docs · ${{ inputs.environment }}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Ref         | \`${{ inputs.ref || github.ref }}\` |"
            echo "| Triggered   | @${{ github.actor }} |"
            echo "| Status      | $status |"
            if [ -n "${URL:-}" ]; then
              echo "| URL         | $URL |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
