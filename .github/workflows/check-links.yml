name: Link Integrity Check

# Triggers: T3 "promote" gate — ready_for_review or `run-full-ci` label, plus
# weekly Sunday cron for drift. See AGENTS.md "Promotion gate".

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
    paths:
      - "apps/docs/content/**/*.mdx"
      - "apps/docs/content/**/*.md"
  workflow_dispatch:
  schedule:
    - cron: "25 4 * * 0"

concurrency:
  group: check-links-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping link integrity check."
          fi

  check-links:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run link checker
        id: linkcheck
        working-directory: apps/docs
        continue-on-error: true
        run: npx tsx scripts/check-links.ts

      - name: Upload link report
        if: always() && hashFiles('apps/docs/link-report.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: link-report
          path: apps/docs/link-report.json
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && steps.linkcheck.outcome == 'failure' && hashFiles('apps/docs/link-report.json') != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('apps/docs/link-report.json', 'utf8'));

            let body = '## 🔗 Link Integrity Report\n\n';
            body += `| Status | Count |\n|--------|-------|\n`;
            body += `| ✅ OK | ${report.summary.ok} |\n`;
            body += `| ⚠️ Warnings | ${report.summary.warnings} |\n`;
            body += `| ❌ Errors | ${report.summary.errors} |\n\n`;

            if (report.issues.length > 0) {
              body += '### Issues Found\n\n';
              for (const issue of report.issues.slice(0, 10)) {
                body += `- **${issue.file}:${issue.line}**\n`;
                body += `  - URL: \`${issue.url}\`\n`;
                body += `  - Issues: ${issue.issues.join(', ')}\n\n`;
              }
              if (report.issues.length > 10) {
                body += `\n*... and ${report.issues.length - 10} more issues. See artifact for full report.*\n`;
              }
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if errors found
        if: steps.linkcheck.outcome == 'failure'
        run: |
          echo "❌ Link check failed. See report for details."
          exit 1
