# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Component API Lint

# ─────────────────────────────────────────────────────────────────────────────
# Enforces the portable component-modeling floor (R5/R6/R8/R11/R12/R18/R19)
# via the `componentApi` preset in `eslint-plugin-react-features`.
#
# Targets every shared-component package — `packages/ui/**/*.tsx`. Mechanical
# rules: no-default-test-id, require-data-slot, no-is-prefix-prop,
# no-inline-style, no-raw-color-literal, no-arbitrary-token-class,
# no-kind-prop-discriminator, no-wrapper-sub-component.
#
# See: skills/interlace-component/SKILL.md (agents repo) and
# packages/eslint-plugin-react-features/docs/rules/component-api/.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/ui/**/*.tsx'
      - 'packages/eslint-plugin-react-features/**'
      - '.github/workflows/component-api-lint.yml'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: component-api-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: component-api lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Build @interlace/eslint-config + its dep graph
        # Root eslint.config.mjs imports the `componentApi` preset from
        # @interlace/eslint-config (built via tsc → dist/src/index.js).
        # That package re-exports every eslint-plugin-* package's configs,
        # so tsc needs the full dependency graph built before its own
        # build can resolve the imports. `turbo run build --filter` walks
        # the graph and builds in topological order — react-features
        # (the rule source) ships first, then eslint-config builds on top.
        # Local lefthook hits cached dist artifacts so the gap isn't
        # visible there.
        run: npx turbo run build --filter=@interlace/eslint-config

      - name: Run vitest on component-api rules
        run: npx vitest run src/tests/component-api/
        working-directory: packages/eslint-plugin-react-features

      - name: Lint packages/ui with componentApi preset
        id: lint
        # The componentApi preset is wired into the root eslint.config.mjs
        # (see "@interlace/ui — componentApi floor" block) and scoped to
        # `packages/ui/src/primitives/**/*.tsx`. Invoking eslint with the
        # target glob is sufficient — no `--rule` overrides needed. The
        # legacy `--resolve-plugins-relative-to` flag was removed in ESLint
        # 10 flat config and triggered a config-error exit + empty JSON
        # report on the first CI run of this workflow.
        #
        # Severity model: the preset configures `no-default-test-id` as
        # 'error' (hard gate) and the rest as 'warn' (guidance). The
        # workflow respects that — errors fail CI, warnings surface in the
        # PR comment for review but don't block. The earlier
        # `--max-warnings 0` promoted every warning to blocking, which
        # contradicted the preset's intent (and only worked because the
        # broken `--resolve-plugins-relative-to` flag meant the rules
        # never actually fired).
        run: |
          set +e
          npx eslint \
            --format json \
            'packages/ui/src/primitives/**/*.tsx' > /tmp/eslint-report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Compute total messages (errors + warnings) so the comment step
          # can fire on warnings-only state, even though `exit_code` is 0.
          total=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/eslint-report.json','utf8'));console.log(r.reduce((s,f)=>s+f.messages.length,0))" 2>/dev/null || echo 0)
          echo "total_messages=$total" >> "$GITHUB_OUTPUT"

      - name: Comment violations on PR
        if: github.event_name == 'pull_request' && steps.lint.outputs.total_messages != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            // Guard: if the lint step exited non-zero due to a config error
            // (not a violation), the JSON file may be empty. Skip the
            // comment in that case so the workflow surfaces the underlying
            // error in the Lint step's log instead of crashing on JSON.parse.
            const raw = fs.existsSync('/tmp/eslint-report.json')
              ? fs.readFileSync('/tmp/eslint-report.json', 'utf8').trim()
              : '';
            if (!raw) {
              core.warning('Empty eslint-report.json — likely a config error in the Lint step. Skipping PR comment.');
              return;
            }
            const report = JSON.parse(raw);
            const ruleToSkillId = {
              'no-default-test-id': 'R5',
              'require-data-slot': 'R6',
              'no-is-prefix-prop': 'R8',
              'no-kind-prop-discriminator': 'R11',
              'no-wrapper-sub-component': 'R12',
              'no-inline-style': 'R18',
              'no-raw-color-literal': 'R19',
              'no-arbitrary-token-class': 'R19',
            };
            const rows = [];
            for (const file of report) {
              for (const m of file.messages) {
                const rule = (m.ruleId || '').split('/').pop();
                const id = ruleToSkillId[rule] || '—';
                const path = file.filePath.replace(`${process.env.GITHUB_WORKSPACE}/`, '');
                rows.push(`| ${id} | \`${rule}\` | \`${path}:${m.line}\` | ${m.message.split('\\n')[0]} |`);
              }
            }
            const body = [
              '## Component API floor — violations',
              '',
              `Found **${rows.length}** violation(s) against the [interlace-component skill](https://github.com/ofri-peretz/agents/blob/main/skills/interlace-component/SKILL.md) (R1–R26).`,
              '',
              '| Skill ID | Rule | File:line | Note |',
              '| -------- | ---- | --------- | ---- |',
              ...rows.slice(0, 40),
              rows.length > 40 ? `\n_… and ${rows.length - 40} more._` : '',
              '',
              '**Auto-fix:** R5 (`no-default-test-id`) is `eslint --fix`-able. R8 (`no-is-prefix-prop`) has a suggestion (manual confirmation needed).',
              '',
              'See [`docs/rules/component-api/`](https://github.com/ofri-peretz/eslint/tree/main/packages/eslint-plugin-react-features/docs/rules/component-api) for per-rule docs.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if violations found
        if: steps.lint.outputs.exit_code != '0'
        run: |
          echo "componentApi lint failed — see PR comment for the rule-ID-keyed report."
          exit 1

      - name: Reference primitive self-test (dialog.tsx must be clean)
        # dialog.tsx is the canonical reference primitive for the
        # interlace-component skill. The same componentApi preset wired into
        # the root eslint.config.mjs covers it; --max-warnings 0 ensures
        # any warning (not just errors) fails the gate, matching the prior
        # behavior where the workflow promoted every rule to error.
        run: npx eslint --max-warnings 0 packages/ui/src/primitives/dialog.tsx

  registry-drift:
    name: registry drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Verify shadcn registry is in sync with packages/ui/src/primitives/
        run: npm run build:check --workspace=registry
        # Fails if any `apps/registry/public/r/<name>.json` is out of sync with
        # the corresponding primitive source. Keeps `ds.interlace.tools` from
        # serving stale JSON when a contributor adds a primitive but forgets to
        # rebuild the registry.
