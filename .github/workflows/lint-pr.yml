name: Documentation Governance

# ─────────────────────────────────────────────────────────────────────────────
# Lint coverage moved to `quality.yml` (oxlint, runs on every PR). This file
# now only carries the docs-validation job, which has no Nx/Turbo dependency.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "!README.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  validate-docs:
    name: Documentation Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📋 Validate documentation
        run: npx tsx scripts/validate-docs.ts

      - name: 📊 Print Summary
        if: always()
        run: |
          echo "## 📋 Documentation Governance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validated README, LICENSE, and documentation structure." >> $GITHUB_STEP_SUMMARY
