# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy app to Vercel

# ─────────────────────────────────────────────────────────────────────────────
# Manual deploy trigger — pick one app from .github/vercel-apps.json and a
# target (preview or production). Invoked via `gh workflow run`:
#
#   gh -R ofri-peretz/eslint workflow run deploy.yml -f app=storybook -f target=production
#   gh -R ofri-peretz/eslint workflow run deploy.yml -f app=registry -f target=preview
#
# Setup (one-time):
#   1. Create a Vercel access token at https://vercel.com/account/tokens
#   2. Add it as a repo secret: gh -R <repo> secret set VERCEL_TOKEN
#
# The org ID + per-app project IDs are stored in `.github/vercel-apps.json`
# (public identifiers; not secrets).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app to deploy
        type: choice
        required: true
        options:
          - docs
          - storybook
          - registry
      target:
        description: Deploy target
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ inputs.app }}-${{ inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.app }} → ${{ inputs.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      # Composite setup: node from .nvmrc + cached node_modules + cached
      # Turbo + cached Next.js / Storybook build artifacts. Skips `npm ci`
      # on a node_modules cache hit (workspace lockfile didn't change).
      # Without this the workflow was doing a cold `npm ci` for 2400+
      # packages on every deploy (~6 minutes); with it, cache-hit runs
      # restore in seconds and the deploy lands well under 5 min total.
      - uses: ./.github/actions/setup
        with:
          next-cache: "true"
          storybook-cache: "true"

      - name: Resolve Vercel project for "${{ inputs.app }}"
        id: project
        run: |
          set -euo pipefail
          ORG_ID=$(jq -r '.orgId' .github/vercel-apps.json)
          PROJECT_ID=$(jq -r --arg app "${{ inputs.app }}" '.apps[$app].projectId' .github/vercel-apps.json)
          PROD_URL=$(jq -r --arg app "${{ inputs.app }}" '.apps[$app].productionUrl // ""' .github/vercel-apps.json)
          ROOT_DIR=$(jq -r --arg app "${{ inputs.app }}" '.apps[$app].rootDirectory // ""' .github/vercel-apps.json)
          if [ "$PROJECT_ID" = "null" ] || [ -z "$PROJECT_ID" ]; then
            echo "::error::No Vercel project mapped for app '${{ inputs.app }}' in .github/vercel-apps.json"
            exit 1
          fi
          if [ -z "$ROOT_DIR" ]; then
            echo "::error::No rootDirectory mapped for app '${{ inputs.app }}' in .github/vercel-apps.json"
            exit 1
          fi
          echo "VERCEL_ORG_ID=$ORG_ID" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "PRODUCTION_URL=$PROD_URL" >> "$GITHUB_ENV"
          echo "ROOT_DIRECTORY=$ROOT_DIR" >> "$GITHUB_ENV"
          echo "Resolved: $PROJECT_ID rootDir=$ROOT_DIR (${{ inputs.app }})"

      # Self-heal the Vercel project's dashboard config every deploy so it
      # can't drift from vercel-apps.json. Resets rootDirectory and nulls
      # out the Build/Output/Install Command overrides so the app's local
      # `vercel.json` is the single source of truth for build settings.
      #
      # Why this exists: the registry project drifted to rootDirectory=`.`
      # + buildCommand=`cd ../.. && npx turbo run build --filter=docs`,
      # which made every prebuilt deploy ship docs content to the registry
      # domain (404s on /r/*.json). Codifying the heal step here means a
      # future drift can't break a deploy silently — the next run snaps it
      # back to what this repo says it should be.
      - name: Self-heal Vercel project config (rootDirectory + build cmds)
        run: |
          set -euo pipefail
          curl -sf -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg root "$ROOT_DIRECTORY" \
              '{rootDirectory: $root, buildCommand: null, outputDirectory: null, installCommand: null, framework: null}')" \
            -o /dev/null
          echo "✓ Project config reset: rootDirectory=$ROOT_DIRECTORY, build/output/install/framework → null (use local vercel.json)"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (${{ inputs.target }})
        run: vercel pull --yes --environment=${{ inputs.target }} --token="$VERCEL_TOKEN"

      # Workspace deps were installed (or restored from cache) by the
      # composite setup above; no second `npm ci` here.

      - name: Build with Vercel
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy
        id: deploy
        # --archive=tgz packs the build output into a single tarball before
        # upload; without it Vercel rejects any deployment >15000 files
        # (registry's prebuild + node_modules tree easily clears that). See
        # commit 6216fc91 which applied the same flag to deploy-docs.yml.
        run: |
          set -euo pipefail
          if [ "${{ inputs.target }}" = "production" ]; then
            URL=$(vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN")
          else
            URL=$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Summarize
        run: |
          {
            echo "## Deployed: \`${{ inputs.app }}\` (${{ inputs.target }})"
            echo ""
            echo "**Deployment URL:** ${{ steps.deploy.outputs.url }}"
            if [ -n "$PRODUCTION_URL" ] && [ "${{ inputs.target }}" = "production" ]; then
              echo ""
              echo "**Production alias:** $PRODUCTION_URL"
            fi
            echo ""
            echo "Vercel project: \`$VERCEL_PROJECT_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"
