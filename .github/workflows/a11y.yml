# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Accessibility

# ─────────────────────────────────────────────────────────────────────────────
# Strict axe-core scan against the apps/docs site, run in both light and dark
# color schemes across the four route archetypes (home, articles, docs
# landing, rule page).
#
# Tag stack: WCAG 2 A/AA/AAA + WCAG 2.1 + WCAG 2.2 + axe best-practice + ACT.
#
# Blocks PR merges on any violation. See apps/docs/A11Y.md for the policy.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
    paths:
      - 'apps/docs/**'
      - 'packages/ui/**'
      - '.github/workflows/a11y.yml'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping a11y axe scan."
          fi

  axe:
    name: axe-core strict scan
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup
        with:
          playwright-cache: "true"
          next-cache: "true"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/docs

      - name: Build @interlace/ui
        run: npm run build --workspace=@interlace/ui

      # Playwright's webServer runs `npm run start` in CI (next start), which
      # requires `.next/` from a production build. Build the docs app once
      # before invoking the spec so playwright doesn't crash with
      # "Could not find a production build in the '.next' directory".
      - name: Build docs (production)
        run: npm run build --workspace=docs

      - name: Run strict a11y scan (Playwright + axe)
        run: npm run test:a11y
        working-directory: apps/docs

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-a11y-report
          path: apps/docs/playwright-report/
          retention-days: 14
