# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Daily Impact Ingest

# Pulls daily metrics from NPM + GitHub, upserts into Supabase, then refreshes
# the storefront ratchet. Runs unattended at 05:00 UTC. No commit-back to the
# repo — everything lives in Supabase.

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC daily
  workflow_dispatch:

concurrency:
  group: daily-impact-ingest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    name: Ingest into Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci --no-audit --no-fund
      - name: Run daily ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: apps/docs
        run: npx tsx scripts/daily-ingest.ts
