# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Upload Coverage to Codecov

# ─────────────────────────────────────────────────────────────────────────────
# Runs every package's `test` task with coverage via Turbo, uploads lcov +
# JUnit results to Codecov for badges + Test Analytics.
#
# Trigger: weekly schedule (keeps the dashboard from going stale) + manual
# workflow_dispatch for on-demand runs (e.g. right after a coverage-focused merge).
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      filter:
        description: "Turbo filter (e.g. eslint-plugin-pg). Empty = all packages."
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup
        uses: ./.github/actions/setup
        with:
          fetch-depth: 0

      - name: Run tests with coverage
        env:
          FILTER_ARG: ${{ inputs.filter && format('--filter={0}', inputs.filter) || '' }}
        run: |
          # `test:coverage` falls back to `test` if a package doesn't define it.
          npx turbo run test:coverage $FILTER_ARG --continue || \
            npx turbo run test $FILTER_ARG --continue

      - name: Locate coverage + JUnit reports
        id: find
        run: |
          set -euo pipefail
          LCOV=$(find packages -path '*/coverage/lcov.info' -type f | head -200)
          JUNIT=$(find packages -name 'junit.xml' -o -name 'test-report.junit.xml' 2>/dev/null | head -200)
          {
            echo "lcov<<EOF"; echo "$LCOV"; echo "EOF"
            echo "junit<<EOF"; echo "$JUNIT"; echo "EOF"
            echo "has_lcov=$([ -n "$LCOV" ] && echo true || echo false)"
            echo "has_junit=$([ -n "$JUNIT" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        if: steps.find.outputs.has_lcov == 'true'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          # Codecov v5 auto-discovers lcov.info under packages/*/coverage.

      - name: Upload test results (Test Analytics)
        if: steps.find.outputs.has_junit == 'true'
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Coverage Report"
            echo ""
            echo "Triggered by: ${{ github.event_name }}"
            echo ""
            echo "### Per-package coverage"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          shopt -s nullglob
          found=false
          for lcov in packages/*/coverage/lcov.info; do
            found=true
            pkg=$(basename "$(dirname "$(dirname "$lcov")")")
            total=$(grep -c '^DA:' "$lcov" || true)
            hit=$(grep '^DA:' "$lcov" | grep -cv ',0$' || true)
            if [ "${total:-0}" -gt 0 ]; then
              pct=$((hit * 100 / total))
              if [ "$pct" -ge 80 ]; then emoji="🟢"
              elif [ "$pct" -ge 60 ]; then emoji="🟡"
              else emoji="🔴"
              fi
              echo "- $emoji **$pkg**: ${pct}% ($hit/$total lines)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          [ "$found" = true ] || echo "_No coverage reports found._" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[View on Codecov](https://codecov.io/gh/${{ github.repository }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports-${{ github.run_id }}
          path: |
            packages/*/coverage/
          retention-days: 7
          if-no-files-found: ignore
