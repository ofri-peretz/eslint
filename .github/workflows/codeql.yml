# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CodeQL

# ─────────────────────────────────────────────────────────────────────────────
# Static security analysis. CodeQL is expensive (~4min wall) so it does NOT
# run on every PR push — it fires on the T3 "promote" gate (ready_for_review
# or `run-full-ci` label) and on a weekly Monday cron. Findings show up under
# Security → Code scanning.
#
# Why we want this on a security-focused plugin monorepo: our rules look for
# vulnerabilities — we should not be the source of any. CodeQL also catches
# JS/TS-level issues that ESLint won't (e.g. tainted-data flows across files).
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
  workflow_dispatch:
  schedule:
    # Weekly Monday 03:17 UTC — runs on a steady cadence regardless of activity,
    # so the security tab stays warm even on quiet weeks. Off-peak time keeps
    # us out of cron storms at the top of the hour.
    - cron: "17 3 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping CodeQL scan."
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
