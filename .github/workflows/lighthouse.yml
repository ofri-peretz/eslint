# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lighthouse (Web Vitals Budget)

# ─────────────────────────────────────────────────────────────────────────────
# Tracks the performance, accessibility, and SEO budgets declared by our
# philosophies — MOTION_PHILOSOPHY.md (CLS = 0), UX_PHILOSOPHY.md #6 (LCP),
# COLOR_PHILOSOPHY.md (contrast budget), TYPOGRAPHY_PHILOSOPHY.md (AA floor).
#
# Gating model (intentionally split):
#   • PR runs (pull_request)        → ADVISORY. The lhci step uses
#     `continue-on-error: true`. The report still uploads as an artifact
#     and renders in checks, but a budget breach doesn't block merge.
#     Rationale: single-pass Lighthouse on a shared GitHub runner has
#     ~50–100ms of LCP jitter from cold CPU / network — too noisy to use
#     as a PR-blocking gate. We were treating noise as failure.
#   • Schedule (weekly Sunday)      → HARD GATE. Same job, same config,
#     but a budget breach exits non-zero and pages the perf owner. This
#     is the canonical "did we regress?" check.
#   • workflow_dispatch (manual)    → HARD GATE. Use for opt-in PR runs
#     when you're explicitly chasing a perf claim.
#
# Config: apps/docs/lighthouserc.json
# Triggers: ready_for_review / `run-full-ci` label / synchronize, plus the
# weekly Sunday cron. See AGENTS.md "Promotion gate".
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
    paths:
      - "apps/docs/**"
      - "packages/eslint-devkit/**"
      - ".github/workflows/lighthouse.yml"
      - "apps/docs/lighthouserc.json"
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * 0"

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # for the result comment

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping Lighthouse."
          fi

  lighthouse:
    name: Web Vitals Budget
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          turbo-cache: "true"
          next-cache: "true"

      - name: Build docs site
        run: npx turbo run build --filter=docs
        env:
          NODE_ENV: production
          # Disable telemetry during CI builds.
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start docs server
        working-directory: apps/docs
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: "3000"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        id: lhci
        working-directory: apps/docs
        # Advisory on PRs (single-pass Lighthouse is too noisy to block on),
        # hard gate on the weekly cron + manual dispatch. The step always
        # produces the .lighthouseci/ artifact for the upload step below.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Annotate PR when budgets breach (advisory)
        if: github.event_name == 'pull_request' && steps.lhci.outcome == 'failure'
        run: |
          echo "::warning title=Lighthouse budget breached (advisory)::Lighthouse assertions failed but did not block this PR. Download the lighthouse-report artifact for full diagnostics, or re-run with the \`run-full-ci\` label / manual dispatch to enforce. The weekly Sunday cron still enforces the budget on main."

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: apps/docs/.lighthouseci/
          retention-days: 14
