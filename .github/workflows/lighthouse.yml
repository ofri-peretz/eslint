# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lighthouse (Web Vitals Budget)

# ─────────────────────────────────────────────────────────────────────────────
# Enforces the performance, accessibility, and SEO budgets declared by our
# philosophies — MOTION_PHILOSOPHY.md (CLS = 0), UX_PHILOSOPHY.md #6 (LCP ≤ 1.5s),
# COLOR_PHILOSOPHY.md (contrast budget), TYPOGRAPHY_PHILOSOPHY.md (AA floor).
#
# Without this gate the budgets are aspirational. With it, a regressing PR
# fails the build.
#
# Config: apps/docs/lighthouserc.json
# Triggers: T3 "promote" gate — ready_for_review or `run-full-ci` label, plus
# weekly Sunday cron for drift. See AGENTS.md "Promotion gate".
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
    paths:
      - "apps/docs/**"
      - "packages/eslint-devkit/**"
      - ".github/workflows/lighthouse.yml"
      - "apps/docs/lighthouserc.json"
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * 0"

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # for the result comment

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping Lighthouse."
          fi

  lighthouse:
    name: Web Vitals Budget
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          turbo-cache: "true"
          next-cache: "true"

      - name: Build docs site
        run: npx turbo run build --filter=docs
        env:
          NODE_ENV: production
          # Disable telemetry during CI builds.
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start docs server
        working-directory: apps/docs
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: "3000"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        working-directory: apps/docs
        # Continue-on-error=false: a budget breach fails the build. That's
        # the entire point of this gate — see MOTION_PHILOSOPHY's CLS=0
        # contract and the rest of the perf rules in lighthouserc.json.
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: apps/docs/.lighthouseci/
          retention-days: 14
