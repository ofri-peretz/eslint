name: Storybook a11y gate

# Hard a11y gate. Builds the Storybook static site, serves it, and runs
# axe-core (via @storybook/test-runner + axe-playwright) against every
# story for wcag2a / wcag2aa / wcag21aa / best-practice. Any violation
# fails the PR.
#
# Triggers: T3 "promote" gate — ready_for_review or `run-full-ci` label, plus
# weekly Sunday cron for drift. See AGENTS.md "Promotion gate".

on:
  # Post-merge verification on main (e.g. a lockfile change that re-hoists
  # storybook's vite breaks the build) — same path filter as the PR trigger.
  push:
    branches: [main]
    paths:
      - 'apps/storybook/**'
      - 'packages/ui/**'
      - 'apps/docs/src/**'
      - '.github/workflows/storybook-a11y.yml'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
    paths:
      - 'apps/storybook/**'
      - 'packages/ui/**'
      - 'apps/docs/src/**'
      - '.github/workflows/storybook-a11y.yml'
      - 'package-lock.json'
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 0"

concurrency:
  group: storybook-a11y-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping Storybook a11y gate."
          fi

  storybook-a11y:
    name: axe a11y check (every story)
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup
        with:
          playwright-cache: "true"

      - name: Build @interlace/ui (consumed by stories)
        run: npm run build --workspace=@interlace/ui

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: apps/storybook

      - name: Build Storybook
        run: npm run build-storybook --workspace=@interlace/storybook

      - name: Run axe against every story
        run: npm run test-storybook:ci --workspace=@interlace/storybook

      - name: Upload Storybook static (on failure, for triage)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: storybook-static-${{ github.run_number }}
          path: apps/storybook/storybook-static
          retention-days: 7
