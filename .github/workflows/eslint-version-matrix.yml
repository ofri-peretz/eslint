name: ILB Cross-Version Matrix

# Runs the cheap synthetic benches (ILB-Arena + ILB-CWE-Corpus) across a
# matrix of Node and ESLint major versions to catch silent FN drift
# from upstream AST changes before users hit it.
#
# Supported ESLint majors are governed by docs/ESLINT_VERSION_SUPPORT.md:
#   - v8 (24% weekly share — gate)
#   - v9 (60% — gate, current default)
#   - v10 (9% — forward-looking exception, released 2026-02-06)
# This matrix MUST cover all three. When the policy changes, update both
# this matrix and the policy doc together.
#
# Why per-major matters (Gap J in the FP_FN_REMEDIATION_TRACKER):
#   - AST shape changes between majors can silently make rules MISS findings
#     (= FN regression with passing tests on the old version). Recall is
#     principle #1 — we cannot allow it to drift on a version bump.
#   - We don't run Wild here — the matrix is hot-path only.
#
# Failure mode: this workflow runs continuously and is INFORMATIONAL by
# default. Promote a row to required status only after it's been green for
# 14 consecutive runs (per the lifecycle gate in benchmarks/README.md §1).

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled, synchronize]
    paths:
      - 'packages/eslint-plugin-*/**'
      - 'packages/eslint-devkit/**'
      - 'benchmarks/**'
      - 'scripts/ilb-*.ts'
      - '.github/workflows/eslint-version-matrix.yml'
  schedule:
    # Downgraded from nightly to weekly Sunday — quota conservation. Drift
    # still surfaces in time for the weekly engineering review, and any
    # promoted PR runs the full matrix via the `run-full-ci` label gate.
    - cron: '30 4 * * 0'
  workflow_dispatch:

concurrency:
  group: ilb-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-full-ci') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$IS_DRAFT" == "false" ]] || [[ "$HAS_LABEL" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Draft PR without \`run-full-ci\` label — skipping cross-version matrix."
          fi

  matrix:
    name: ${{ matrix.bench }} · node24 · eslint-${{ matrix.eslint }}
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      # Cancel sibling cells on first failure when running the cross-version
      # matrix — when an ESLint major bumps and breaks one cell, every other
      # cell will almost always break the same way. Saves runner minutes per
      # regression. Override via workflow_dispatch if you need full results.
      fail-fast: true
      matrix:
        # Node axis is fixed to 24 (the repo's `engines.node` and `.nvmrc`).
        # All three ESLint majors are supported per docs/ESLINT_VERSION_SUPPORT.md:
        #   8.x = legacy active (24% share), 9.x = current default (60%),
        #   10.x = forward-looking (9%, released 2026-02-06).
        eslint: ['8.x', '9.x', '10.x']
        bench: [arena, juliet]
        experimental: [false]
        include:
          # Pinned-version sanity check on the most-used minor — catches
          # regressions specific to that pin without exploding the matrix.
          - eslint: '9.39'
            bench: arena
            experimental: false
          - eslint: '9.39'
            bench: juliet
            experimental: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install ESLint ${{ matrix.eslint }}
        run: |
          set -e
          case "${{ matrix.eslint }}" in
            "8.x")
              npm install --no-save eslint@^8
              ;;
            "9.39")
              npm install --no-save eslint@9.39.0
              ;;
            "9.x")
              npm install --no-save eslint@^9
              ;;
            "10.x")
              npm install --no-save eslint@^10
              ;;
            *)
              echo "::error::Unknown ESLint version selector: ${{ matrix.eslint }}"
              exit 1
              ;;
          esac
          node -e "console.log('eslint@' + require('eslint/package.json').version)"

      - name: Run ILB-Arena
        if: matrix.bench == 'arena'
        run: npm run ilb:arena

      - name: Run ILB-CWE-Corpus
        if: matrix.bench == 'juliet'
        run: npm run ilb:cwe-corpus

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ilb-${{ matrix.bench }}-node24-eslint${{ matrix.eslint }}-${{ github.run_number }}
          path: benchmarks/results/ilb-${{ matrix.bench }}/*.json
          retention-days: 14
